# =============================================================================
# tmux.conf - Dark theme (Nord) + vi-mode + custom shortcuts
# =============================================================================

# -----------------------------------------------------------------------------
# Prefix key: Ctrl+b -> Ctrl+a
# -----------------------------------------------------------------------------
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# -----------------------------------------------------------------------------
# General settings
# -----------------------------------------------------------------------------
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

set -g history-limit 10000
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -sg escape-time 10
set -g focus-events on

# -----------------------------------------------------------------------------
# vi-mode (copy mode)
# -----------------------------------------------------------------------------
setw -g mode-keys vi

bind Enter copy-mode

bind -T copy-mode-vi v   send -X begin-selection
bind -T copy-mode-vi V   send -X select-line
bind -T copy-mode-vi C-v send -X rectangle-toggle
bind -T copy-mode-vi y   send -X copy-selection-and-cancel
bind -T copy-mode-vi H   send -X start-of-line
bind -T copy-mode-vi L   send -X end-of-line
bind -T copy-mode-vi q   send -X cancel

# -----------------------------------------------------------------------------
# Pane splitting (| = vertical, - = horizontal)
# -----------------------------------------------------------------------------
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind "%"

bind c new-window -c "#{pane_current_path}"

# Pane navigation (vi keys)
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Pane resize (repeatable)
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Zoom pane
bind m resize-pane -Z

# -----------------------------------------------------------------------------
# Reload config
# -----------------------------------------------------------------------------
bind r source-file ~/.tmux.conf \; display "tmux.conf reloaded"

# -----------------------------------------------------------------------------
# Color theme: Nord
# -----------------------------------------------------------------------------
set -g status on
set -g status-interval 5
set -g status-position bottom
set -g status-justify left
set -g status-style "bg=#3B4252,fg=#D8DEE9"

set -g status-left-length 40
set -g status-left "#[bg=#5E81AC,fg=#ECEFF4,bold] #S #[bg=#3B4252,fg=#5E81AC]"

set -g status-right-length 60
set -g status-right "#[fg=#4C566A,bg=#3B4252]#[fg=#D8DEE9,bg=#4C566A] %Y-%m-%d #[fg=#81A1C1,bg=#4C566A]#[fg=#ECEFF4,bg=#81A1C1,bold] %H:%M "

setw -g window-status-style "bg=#3B4252,fg=#4C566A"
setw -g window-status-format " #I:#W "

setw -g window-status-current-style "bg=#88C0D0,fg=#2E3440,bold"
setw -g window-status-current-format " #I:#W "

set -g pane-border-style "fg=#4C566A"
set -g pane-active-border-style "fg=#88C0D0"

setw -g mode-style "bg=#88C0D0,fg=#2E3440"

set -g message-style "bg=#EBCB8B,fg=#2E3440,bold"
set -g message-command-style "bg=#3B4252,fg=#D8DEE9"
